# Pipeline: Cloud Functions Gen2 (HTTP) desde onemarketer/src.
# Trigger en GCP: archivo = onemarketer/cloudbuild.yaml, filtro opcional onemarketer/**
#
# Job batch invocado por POST (p. ej. Cloud Scheduler).
substitutions:
  _LOCATION: 'us-central1'
  _PROJECT_ID: 'dev-utpbi-data-operation'
  _FUNCTION_NAME: 'dev-utpbi-onemarketer-reporte-chats'
  _SERVICE_ACCOUNT: 'dev-utpbi-data-operation@appspot.gserviceaccount.com'
  _RUNTIME: 'python310'
  _ENTRY_POINT: 'main'
  _MEMORY: '2Gi'
  _TIMEOUT: '3600s'
  _CPU: '2'
  _MAX_INSTANCES: '3'
  _CONCURRENCY: '1'

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'functions'
      - 'deploy'
      - '${_FUNCTION_NAME}'
      - '--gen2'
      - '--project=${_PROJECT_ID}'
      - '--region=${_LOCATION}'
      - '--runtime=${_RUNTIME}'
      - '--source=onemarketer/src'
      - '--entry-point=${_ENTRY_POINT}'
      - '--trigger-http'
      - '--allow-unauthenticated'
      - '--memory=${_MEMORY}'
      - '--timeout=${_TIMEOUT}'
      - '--cpu=${_CPU}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--concurrency=${_CONCURRENCY}'
      - '--service-account=${_SERVICE_ACCOUNT}'

options:
  logging: CLOUD_LOGGING_ONLY
