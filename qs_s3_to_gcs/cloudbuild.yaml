# Pipeline: Cloud Run Job (micro-batch S3 → GCS) con Dockerfile.
#
# Variables de ambiente (dev/prd): ACTIVADOR → Variables de sustitución
#   Obligatorias: _PROJECT_ID, _JOB_NAME, _SERVICE_ACCOUNT, _BUCKET_NAME, _DATASET_ID
#   Opcionales:   _LOCATION, _SCHEDULER_NAME, _AWS_S3_BUCKET, _AWS_S3_PREFIX,
#                 _AWS_ENDPOINT_URL, _GCP_DESTINATION_PREFIX, _SOURCE_DIR, _MEMORY,
#                 _CPU, _TASK_TIMEOUT, _MAX_RETRIES, _CONFIG_PATH
#
# Ejemplo prd:
#   _PROJECT_ID=prd-utpbi-data-operation
#   _JOB_NAME=prd-utpbi-s3-to-gcs-micro-batch
#   _SERVICE_ACCOUNT=genesys-audio-processor@prd-utpbi-data-operation.iam.gserviceaccount.com
#   _BUCKET_NAME=dev-utp-stg-queuesmart
#   _DATASET_ID=raw_queuesmart
#   _SCHEDULER_NAME=prd-utpbi-s3-to-gcs-daily
#   _AWS_S3_BUCKET=utp-a106-s3-prd-02-ticketero-counter
#   _AWS_ENDPOINT_URL=https://s3.us-east-1.amazonaws.com
#   _LOCATION=us-central1
#   _SOURCE_DIR=qs_s3_to_gcs/src
#
# La SA del Job necesita:
#   - roles/secretmanager.secretAccessor en QueeSmartSecrets (AWS keys)
#   - escritura en bucket GCS destino
#   - roles/bigquery.dataEditor en dataset _DATASET_ID
#
# El deploy crea el bucket GCS destino si no existe (idempotente).
# Scheduler: ejecutar src/setup-scheduler.sh aparte del pipeline.
substitutions:
  _LOCATION: 'us-central1'
  _SOURCE_DIR: 'qs_s3_to_gcs/src'
  _MEMORY: '512Mi'
  _CPU: '1'
  _TASK_TIMEOUT: '900s'
  _MAX_RETRIES: '1'
  _CONFIG_PATH: '/app/config/config.json'
  _AWS_S3_PREFIX: ''
  _AWS_ENDPOINT_URL: 'https://s3.us-east-1.amazonaws.com'
  _GCP_DESTINATION_PREFIX: 'data/input/queuesmart_mp3/imported_from_s3/'

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - 'qs_s3_to_gcs/scripts/cloudbuild_deploy.sh'
    env:
      - '_PROJECT_ID=${_PROJECT_ID}'
      - '_JOB_NAME=${_JOB_NAME}'
      - '_SERVICE_ACCOUNT=${_SERVICE_ACCOUNT}'
      - '_BUCKET_NAME=${_BUCKET_NAME}'
      - '_DATASET_ID=${_DATASET_ID}'
      - '_SCHEDULER_NAME=${_SCHEDULER_NAME}'
      - '_AWS_S3_BUCKET=${_AWS_S3_BUCKET}'
      - '_AWS_S3_PREFIX=${_AWS_S3_PREFIX}'
      - '_AWS_ENDPOINT_URL=${_AWS_ENDPOINT_URL}'
      - '_GCP_DESTINATION_PREFIX=${_GCP_DESTINATION_PREFIX}'
      - '_LOCATION=${_LOCATION}'
      - '_SOURCE_DIR=${_SOURCE_DIR}'
      - '_MEMORY=${_MEMORY}'
      - '_CPU=${_CPU}'
      - '_TASK_TIMEOUT=${_TASK_TIMEOUT}'
      - '_MAX_RETRIES=${_MAX_RETRIES}'
      - '_CONFIG_PATH=${_CONFIG_PATH}'

options:
  logging: CLOUD_LOGGING_ONLY
